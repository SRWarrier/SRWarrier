---
layout: default
---

<div class="container" style="padding-top: 6rem; padding-bottom: 4rem">
    <article class="post" itemscope itemtype="http://schema.org/BlogPosting">
        <header style="margin-bottom: 2.5rem; text-align: center">
            <p
                class="post-meta"
                style="color: var(--text-muted); font-size: 0.9rem"
            >
                <time
                    datetime="{{ page.date | datetime }}"
                    itemprop="datePublished"
                >
                    {{ page.date | date: "%B %d, %Y" }}
                </time>
            </p>
            <h1
                itemprop="name headline"
                style="
                    font-family: &quot;Space Grotesk&quot;, sans-serif;
                    font-size: 2.25rem;
                    line-height: 1.3;
                "
            >
                {{ page.title }}
            </h1>
        </header>

        <div class="post-content" itemprop="articleBody">{{ content }}</div>
    </article>

    <div
        style="
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        "
    >
        <a href="/blog" style="color: var(--text-secondary); font-size: 0.9rem"
            >← Back to Blog</a
        >
    </div>
</div>

<style>
    .post-content {
        max-width: 750px;
        margin: 0 auto;
        line-height: 1.85;
        color: var(--text-secondary);
    }
    .post-content h1,
    .post-content h2,
    .post-content h3,
    .post-content h4,
    .post-content h5,
    .post-content h6 {
        color: var(--text-primary);
        margin-top: 2.5rem;
        margin-bottom: 1rem;
        font-family: "Space Grotesk", sans-serif;
    }
    .post-content h2 {
        font-size: 1.75rem;
    }
    .post-content h3 {
        font-size: 1.35rem;
    }
    .post-content p {
        margin-bottom: 1.5rem;
    }
    .post-content ul,
    .post-content ol {
        margin-bottom: 1.5rem;
        padding-left: 1.75rem;
    }
    .post-content li {
        margin-bottom: 0.5rem;
    }
    .post-content blockquote {
        border-left: 3px solid var(--accent-primary);
        padding-left: 1.25rem;
        margin: 1.5rem 0;
        color: var(--text-muted);
        font-style: italic;
    }
    .post-content code {
        background: var(--bg-card);
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        font-size: 0.9em;
    }
    .post-content pre {
        background: var(--bg-card);
        padding: 1rem;
        border-radius: 8px;
        overflow-x: auto;
        margin-bottom: 1.5rem;
    }
    .post-content img {
        max-width: 100%;
        border-radius: 8px;
        margin: 1.5rem 0;
    }
    .post-content a {
        color: var(--accent-primary);
        border-bottom: 1px solid transparent;
    }
    .post-content a:hover {
        border-bottom-color: var(--accent-primary);
    }
</style>
